# Fly.io config for PocketBase
# Usage: cd pocketbase && fly launch / fly deploy

app = "detailing-pb"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Set secrets via: fly secrets set APP_CRON_URL=... CRON_SECRET=...
  # PB data directory is on the mounted volume

[mounts]
  source = "pb_data"
  destination = "/pb/pb_data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
